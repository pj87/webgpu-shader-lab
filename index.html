<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU Shader Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Milestone 1</p>
          <h1>WebGPU Shader Lab</h1>
        </div>
        <div class="status-group">
          <div class="status-row">
            <span>Adapter</span>
            <strong id="adapterStatus">Checking</strong>
          </div>
          <div class="status-row">
            <span>Pipeline</span>
            <strong id="pipelineStatus">Idle</strong>
          </div>
        </div>
      </aside>

      <section class="workspace">
        <div class="editor-pane">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Fragment WGSL</p>
              <h2>Shader Editor</h2>
            </div>
            <button id="runButton" type="button">Run</button>
          </div>
          <textarea id="shaderEditor" spellcheck="false"></textarea>
          <pre id="errorPanel" class="error-panel">Ready.</pre>
        </div>

        <div class="preview-pane">
          <canvas id="previewCanvas"></canvas>
        </div>
      </section>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU Shader Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Milestone 6</p>
          <h1>WebGPU Shader Lab</h1>
        </div>
        <div id="viewerNotice" class="viewer-notice" hidden>
          <strong>Public Viewer</strong>
          <span>Read-only shader link</span>
        </div>
        <section class="project-panel" aria-label="Projects">
          <div>
            <p class="eyebrow">Project</p>
            <input id="projectTitleInput" type="text" value="Untitled Shader" aria-label="Project title" />
          </div>
          <div class="project-actions">
            <button id="newProjectButton" type="button">New</button>
            <button id="saveProjectButton" type="button">Save</button>
            <button id="duplicateProjectButton" type="button">Copy</button>
            <button id="deleteProjectButton" type="button">Delete</button>
          </div>
          <select id="projectSelect" size="5" aria-label="Saved projects"></select>
          <div class="project-actions">
            <button id="exportProjectButton" type="button">Export</button>
            <button id="importProjectButton" type="button">Import</button>
            <input id="importProjectInput" type="file" accept="application/json" hidden />
          </div>
          <div class="project-actions">
            <button id="shareProjectButton" type="button">Share</button>
            <button id="copyShareLinkButton" type="button">Copy Link</button>
          </div>
          <button id="editCopyButton" class="wide-button" type="button" hidden>Edit Copy</button>
        </section>
        <section id="recoveryPanel" class="recovery-panel" aria-label="Recovery" hidden>
          <div>
            <strong>Autosave Found</strong>
            <span id="recoveryTime">Draft available</span>
          </div>
          <div class="project-actions">
            <button id="restoreDraftButton" type="button">Restore</button>
            <button id="discardDraftButton" type="button">Discard</button>
          </div>
        </section>
        <div class="status-group">
          <div class="status-row">
            <span>Project</span>
            <strong id="projectStatus">Draft</strong>
          </div>
          <div class="status-row">
            <span>Autosave</span>
            <strong id="autosaveStatus">Idle</strong>
          </div>
          <div class="status-row">
            <span>Adapter</span>
            <strong id="adapterStatus">Checking</strong>
          </div>
          <div class="status-row">
            <span>Pipeline</span>
            <strong id="pipelineStatus">Idle</strong>
          </div>
          <div class="status-row">
            <span>Frame</span>
            <strong id="frameStatus">Paused</strong>
          </div>
        </div>
      </aside>

      <section class="workspace">
        <div class="editor-pane">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Fragment WGSL</p>
              <h2>Shader Editor</h2>
            </div>
            <div class="toolbar-actions">
              <select id="templateSelect" aria-label="Shader template">
                <option value="rings">Rings</option>
                <option value="plasma">Plasma</option>
                <option value="gradient">Gradient</option>
              </select>
              <label class="toggle-control">
                <input id="autoRunToggle" type="checkbox" checked />
                <span>Auto</span>
              </label>
              <button id="runButton" type="button">Run</button>
            </div>
          </div>
          <textarea id="shaderEditor" spellcheck="false"></textarea>
          <pre id="errorPanel" class="error-panel">Ready.</pre>
        </div>

        <div class="preview-pane">
          <div class="preview-toolbar">
            <button id="pauseButton" type="button">Pause</button>
            <button id="resetTimeButton" type="button">Reset</button>
            <button id="fullscreenButton" type="button">Full</button>
          </div>
          <canvas id="previewCanvas"></canvas>
          <div class="inspector">
            <label>
              <span>Scale</span>
              <input id="scaleInput" type="range" min="0.25" max="4" step="0.01" value="1" />
              <strong id="scaleValue">1.00</strong>
            </label>
            <label>
              <span>Intensity</span>
              <input id="intensityInput" type="range" min="0" max="2" step="0.01" value="1" />
              <strong id="intensityValue">1.00</strong>
            </label>
            <div class="preset-panel">
              <div class="preset-title">
                <span>Presets</span>
                <select id="presetSelect" aria-label="Uniform presets"></select>
              </div>
              <input id="presetNameInput" type="text" value="Preset 1" aria-label="Preset name" />
              <div class="preset-actions">
                <button id="savePresetButton" type="button">Save</button>
                <button id="loadPresetButton" type="button">Load</button>
                <button id="deletePresetButton" type="button">Delete</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>
